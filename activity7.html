<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no"
    >

    <title>Activity 7 - Follow the Directions</title>

    <link rel="stylesheet" href="activity7.css">
</head>

<body>

    <main class="game-screen" id="gameScreen">

        <div class="instruction-box" id="instructionBox">
            Move to the building
        </div>

        <!-- Character -->
        <div class="character" id="character"></div>

        <!-- Message shown when entering the building -->
        <div class="arrival-message" id="arrivalMessage">
            Entering the building...
        </div>

        <!-- Movement buttons -->
        <div class="controls">

            <button
                class="direction-button"
                id="forwardButton"
                aria-label="Move forward"
            >
                ▲
                <span>Forward</span>
            </button>

            <div class="middle-controls">

                <button
                    class="direction-button"
                    id="leftButton"
                    aria-label="Move left"
                >
                    ◀
                    <span>Left</span>
                </button>

                <button
                    class="direction-button"
                    id="rightButton"
                    aria-label="Move right"
                >
                    ▶
                    <span>Right</span>
                </button>

            </div>

            <button
                class="direction-button"
                id="backwardButton"
                aria-label="Move backward"
            >
                ▼
                <span>Back</span>
            </button>

        </div>

    </main>

    <a href="activity5.html" class="previous-activity-button">
        ◀ Previous Activity
    </a>

    <script src="activity7.js"></script>

</body>
</html>
