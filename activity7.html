<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Activity 7 - Follow the Directions</title>

    <link rel="stylesheet" href="activity7.css">
</head>

<body>

    <main class="game-screen" id="gameScreen">

        <div class="instruction-box">
            Follow the directions
        </div>

<div class="character" id="character"></div>

        <div class="controls">

            <button class="direction-button" id="forwardButton">
                ▲
                <span>Forward</span>
            </button>

            <div class="middle-controls">

                <button class="direction-button" id="leftButton">
                    ◀
                    <span>Left</span>
                </button>

                <button class="direction-button" id="rightButton">
                    ▶
                    <span>Right</span>
                </button>

            </div>

            <button class="direction-button" id="backwardButton">
                ▼
                <span>Back</span>
            </button>

        </div>

    </main>

    <a href="activity5.html" class="previous-activity-button">
    ◀ Previous Activity
</a>
    <script src="activity7.js"></script>

</body>

</html>
