<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Poppop Phonics</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="game-card">

        <h1>🌟 Poppop Phonics 🌟</h1>

        <p class="instructions">
            Choose the missing vowel.
        </p>

        <div class="score-area">
            Score: <span id="score">0</span>
        </div>

        <div id="word" class="word">
            C _ T
        </div>

        <div class="vowel-buttons">
            <button class="vowel" data-vowel="A">A</button>
            <button class="vowel" data-vowel="E">E</button>
            <button class="vowel" data-vowel="I">I</button>
            <button class="vowel" data-vowel="O">O</button>
            <button class="vowel" data-vowel="U">U</button>
        </div>

        <p id="message" class="message">
            Pick a vowel!
        </p>

        <button id="sound-button" class="sound-button">
            🔊 Hear the word
        </button><div class="recording-area">
    <h2>🎤 Say the word</h2>

    <button id="record-button" class="record-button">
        Start Recording
    </button>

    <button id="stop-button" class="stop-button" disabled>
        Stop Recording
    </button>

    <p id="recording-message">
        Press Start Recording, then say the word.
    </p>

    <audio id="audio-playback" controls hidden></audio>
</div>

        <button id="next-button" class="next-button" disabled>
            Next Word
        </button>
<div id="result-area" class="result-area" hidden>
    <h2>🎉 Activity Finished!</h2>

    <p>
        Your score:
        <strong><span id="final-score">0</span> / 10</strong>
    </p>

    <p id="result-message"></p>

    <p>
        Previous score:
        <span id="previous-score">No previous score</span>
    </p>

    <button id="restart-button" class="restart-button">
        Play Again
    </button>
</div>
    </main>

    <script src="script.js"></script>

</body>
</html>
