<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Poppop Phonics</title>

    <link rel="stylesheet" href="style.css">
</head>

<body><div id="login-screen">

    <h1>🌟 POPPOP PHONICS 🌟</h1>

    <p>Please enter your email to begin.</p>

    <input
        type="email"
        id="email-input"
        placeholder="student@email.com"
    >

    <br><br>

    <button id="start-button">
        🚀 Start Learning
    </button>
    
    <button id="guest-button" type="button">
    🎮 Enter Without Email
</button>

    <p id="email-message"></p>

</div>

    <main class="game-card" id="game-container" hidden>

        <h1>🌟 Poppop Phonics 🌟</h1>

        <p class="instructions">
            Choose the missing vowel.
        </p>

        <div class="score-area">
            Score: <span id="score">0</span>
        </div>

        <div id="word" class="word">
            C _ T
        </div>

        <div class="vowel-buttons">
            <button class="vowel" data-vowel="A">A</button>
            <button class="vowel" data-vowel="E">E</button>
            <button class="vowel" data-vowel="I">I</button>
            <button class="vowel" data-vowel="O">O</button>
            <button class="vowel" data-vowel="U">U</button>
        </div>

        <p id="message" class="message">
            Pick a vowel!
        </p>

        <button id="sound-button" class="sound-button">
            🔊 Hear the word
        </button>

        <button id="next-button" class="next-button" disabled>
            Next Word
        </button>
<div id="result-area" class="result-area" hidden>
    <h2>🎉 Activity Finished!</h2>

    <p>
        Your score:
        <strong><span id="final-score">0</span> / 10</strong>
    </p>

    <p id="result-message"></p>

    <p>
        Previous score:
        <span id="previous-score">No previous score</span>
    </p>

<div class="result-buttons">

    <button
        id="restart-button"
        class="restart-button"
        type="button">
        Play Again
    </button>

</div>

</div>

<div class="activity-navigation">

    <button
        id="previous-activity-button"
        class="restart-button"
        type="button">
        🏠 Home
    </button>

    <button
        id="next-activity-button"
        class="restart-button"
        type="button">
        Next Activity →
    </button>

</div>

</main>
    </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
