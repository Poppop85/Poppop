<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Poppop Phonics - Activity 3</title>

    <link rel="stylesheet" href="activity3.css">
</head>

<body>

    <main class="game-card">

        <h1>🌟 Poppop Phonics 🌟</h1>

        <h2>Activity 3</h2>

        <p class="instructions">
            Drag the correct first letter onto the picture.
        </p>

        <div class="score-area">
            Score:
            <span id="score">0</span>/10
        </div>

        <div class="progress">
            Question
            <span id="question-number">1</span>
            of
            <span id="total-questions">10</span>
        </div>

        <div
            id="drop-zone"
            class="drop-zone">

            <div
                id="picture"
                class="picture">
                🍎
            </div>

            <div
                id="word"
                class="word">
                Apple
            </div>

            <p>
                Drop the letter here
            </p>

        </div>

        <div
            id="feedback"
            class="feedback">
            Drag the correct letter.
        </div>

        <div
            id="letters"
            class="letters">

            <!-- JavaScript creates the letters -->

        </div>

        <button
            id="sound-button"
            class="sound-button">
            🔊 Hear the Word
        </button>
        
        <button
    id="previousButton"
    class="sound-button"
    type="button">
    ← Previous Activity
</button>

<button
    id="nextButton"
    class="sound-button"
    type="button">
    next →
</button>

    </main>

    <script src="activity3.js"></script>

</body>
</html>
