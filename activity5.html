<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Poppop Phonics - Activity 5</title>

    <link rel="stylesheet" href="activity5.css">
</head>

<body>

    <main class="game-card">

        <h1>📚 Poppop Phonics 📚</h1>

        <h2>Activity 5</h2>

        <p class="instructions">
            Walk to the library door.
        </p>

        <div id="game-world" class="game-world">

            <div class="sky-decoration">
                ☁️
            </div>

            <div class="library">

                <div class="library-sign">
                    LIBRARY
                </div>

                <div class="library-building">
                    🏛️
                </div>

                <div
                    id="library-door"
                    class="library-door">
                    🚪
                </div>

            </div>

            <div
                id="character"
                class="character">
                🙂
            </div>

        </div>

        <p
            id="message"
            class="message">
            Use the buttons to walk.
        </p>

        <button
            id="enter-button"
            class="enter-button"
            type="button"
            hidden>
            📚 Enter Library
        </button>

        <div class="movement-buttons">

            <button
                id="left-button"
                class="move-button"
                type="button">
                ⬅️
            </button>

            <button
                id="up-button"
                class="move-button"
                type="button">
                ⬆️
            </button>

            <button
                id="right-button"
                class="move-button"
                type="button">
                ➡️
            </button>

        </div>

        <div class="activity-navigation">

            <button
                id="previous-button"
                class="navigation-button"
                type="button">
                ← Activity 4
            </button>

        </div>

    </main>

    <script src="activity5.js"></script>

</body>

</html>
